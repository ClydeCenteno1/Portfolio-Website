<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact - Clyde's Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="styles.css">
    <style>
        html {
            scroll-behavior: smooth;
        }
    </style>

</head>

<body class="bg-secondary m-0 p-0 d-flex flex-column min-vh-100">

    <!-- Navigation Bar: Contains the site logo, brand name, navigation links, and search form -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary shadow-sm sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-item-center" href="#">
                <img src="images/1771458621917.jpg" alt="Logo" width="50" height="50"
                    class="d-inline-block align-text-top rounded-circle border ">
            </a>
            <a class="navbar-brand fw-medium fs-2" href="#">My Portfolio</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup"
                aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                <div class="navbar-nav ms-auto fw-medium ">
                    <a class="nav-link me-2 my-auto " href="index.html">Home</a>
                    <a class="nav-link me-2 my-auto" href="index.html">About</a>    
                    <a class="nav-link me-2 my-auto" href="exploreMore.html">Projects</a>
                    <a class="nav-link me-2 my-auto" href="contact.html">Contact</a>
                    <form class="d-flex form-control" role="search">
                        <input class="search me-2 my-auto border-0" type="search" placeholder="Search in site"
                            aria-label="Search" />
                        <i class="fa fa-search align-self-center ms-auto" aria-hidden="true"></i>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <section class="container py-5 flex-grow-1 align-items-center">
        <div class="row align-items-center">

            <div class="contactWords col-md-6 h-100 d-flex align-items-center">
                <div class="text-white">
                    <div class="mx-auto my-auto">
                        <h1 class="display-5 fw-semibold mb-3">Get in contact with me!</h1>
                        <h2 class="fw-normal fs-3 fw-medium mb-3">I'd love to hear from you!</h2>
                        <p style="font-size: 0.8rem;">If you would like to work together, or hire me feel free to email
                            me!
                        </p>
                    </div>
                </div>

            </div>



            <div class="col-md-6">
                <form>

                    <div class="col-md-12">
                        <div class="form-group text-white">
                            <label for="email" class="form-label">Email address</label>
                            <input type="text" name="email" id="email" class="form-control" placeholder="Email"
                                required>
                        </div>
                    </div>

                    <div class="row mt-2">
                        <div class="col-md-6">
                            <div class="form-group text-white">
                                <label for="fName" class="form-label m-0">First Name</label>
                                <input type="text" class="form-control" name="fName" id="fName" placeholder="First Name"
                                    required>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <div class="form-group text-white">
                                <label for="lName" class="form-label m-0">Last Name</label>
                                <input type="text" class="form-control" name="lName" id="lName" placeholder="Last Name"
                                    required>
                            </div>
                        </div>
                    </div>

                    <div class="messages text-white mt-3">
                        <label for="floatingTextarea">Message</label>
                        <textarea class="form-control" placeholder="Leave a message here" id="floatingTextarea"
                            style="height: 200px;"></textarea>

                    </div>
                    <div class="d-flex mt-3">
                        <button type="submit" class="btn border text-white rounded-1 ms-auto py-2 px-5">Submit</button>
                    </div>
                </form>
            </div>


        </div>
    </section>










    <!-- Footer -->
    <footer id="contact" class="container-fluid py-5 border-top bg-white mb-0">
        <div class="d-flex justify-content-evenly align-items-center">
            <div class="d-flex">
                <i class="fa fa-copyright my-auto me-1" aria-hidden="true"></i>
                <p class="my-auto">2026, Clyde Centeno</p>
            </div>
            <p class="my-auto">All rights reserved.</p>
            <p class="my-auto">Follow me on social media!</p>
        </div>
    </footer>

    <!-- ========================================
         BOOTSTRAP JAVASCRIPT AND DEPENDENCIES
         ======================================== -->
    <!-- Required for Bootstrap components like navbar toggle, modals, dropdowns, etc. -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
